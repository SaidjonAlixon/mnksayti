kind = "web"
previewPath = "/"
title = "MNK Logistics LLC"
version = "1.0.0"
id = "artifacts/mnk-logistics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24707

[services.development]
run = "pnpm --filter @workspace/mnk-logistics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mnk-logistics", "run", "build" ]
publicDir = "artifacts/mnk-logistics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24707"
BASE_PATH = "/"
